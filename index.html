<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Практическое руководство Claude Code</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Shippori+Mincho:wght@400;700&family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #0f0f1a;
    background-image:
      radial-gradient(ellipse at 20% 40%, rgba(217, 119, 47, 0.12) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 60%, rgba(30, 60, 114, 0.2) 0%, transparent 50%);
    font-family: 'Noto Serif', 'Noto Serif JP', serif;
    overflow: hidden;
    user-select: none;
  }

  .scene {
    perspective: 2400px;
    perspective-origin: 50% 50%;
    margin-top: 8px;
  }

  .book {
    position: relative;
    width: 1020px;
    height: 680px;
    transform-style: preserve-3d;
    transform: rotateX(3deg);
  }

  .book::after {
    content: '';
    position: absolute;
    bottom: -40px;
    left: 6%;
    width: 88%;
    height: 56px;
    background: radial-gradient(ellipse, rgba(0,0,0,0.55) 0%, transparent 70%);
    filter: blur(12px);
  }

  .page {
    position: absolute;
    width: 50%;
    height: 100%;
    top: 0;
    right: 0;
    transform-origin: left center;
    transform-style: preserve-3d;
    transition: transform 0.6s cubic-bezier(0.22, 0.61, 0.36, 1);
    cursor: grab;
    z-index: 1;
  }

  .page.dragging {
    transition: none;
    cursor: grabbing;
  }

  .page.flipped {
    transform: rotateY(-180deg);
    z-index: 0;
  }

  .page.snap-back {
    transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .page.snap-complete {
    transition: transform 0.5s cubic-bezier(0.22, 0.61, 0.36, 1);
  }

  .page .front,
  .page .back {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    border-radius: 0 10px 10px 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    padding: 44px 40px;
  }

  .page .front {
    background: linear-gradient(135deg, #fefcf7 0%, #f5f0e8 100%);
    border-left: 1px solid #e0d6c2;
    box-shadow: inset -10px 0 28px rgba(0,0,0,0.06), 3px 0 10px rgba(0,0,0,0.1);
  }

  .page .back {
    background: linear-gradient(225deg, #fefcf7 0%, #f5f0e8 100%);
    transform: rotateY(180deg);
    border-radius: 10px 0 0 10px;
    border-right: 1px solid #e0d6c2;
    border-left: none;
    box-shadow: inset 10px 0 28px rgba(0,0,0,0.06), -3px 0 10px rgba(0,0,0,0.1);
  }

  .left-page {
    position: absolute;
    width: 50%;
    height: 100%;
    left: 0;
    top: 0;
    background: linear-gradient(225deg, #fefcf7 0%, #f5f0e8 100%);
    border-radius: 10px 0 0 10px;
    border-right: 1px solid #e0d6c2;
    box-shadow: inset 10px 0 28px rgba(0,0,0,0.06);
    display: flex;
    flex-direction: column;
    padding: 44px 40px;
    overflow: hidden;
  }

  .page-number {
    font-size: 11px;
    color: #b0a48f;
    text-align: right;
    margin-bottom: 18px;
    letter-spacing: 2px;
  }

  .left-page .page-number { text-align: left; }

  .chapter-label {
    font-size: 11px;
    color: #D97B2F;
    letter-spacing: 6px;
    margin-bottom: 8px;
    font-weight: 700;
  }

  .page-title {
    font-family: 'Noto Serif', 'Shippori Mincho', serif;
    font-size: 28px;
    font-weight: 700;
    color: #2c2416;
    margin-bottom: 18px;
    line-height: 1.5;
  }

  .page-body {
    font-size: 15px;
    line-height: 2;
    color: #3a3328;
    flex: 1;
    overflow: hidden;
  }

  .page-body p { margin-bottom: 14px; }

  .page-body .dropcap::first-letter {
    font-size: 52px;
    float: left;
    line-height: 0.8;
    margin: 6px 12px 0 0;
    color: #D97B2F;
    font-weight: 700;
  }

  .divider {
    text-align: center;
    margin: 18px 0;
    color: #D9A76F;
    font-size: 16px;
    letter-spacing: 8px;
  }

  .quote {
    border-left: 3px solid #D97B2F;
    padding: 14px 22px;
    margin: 16px 0;
    color: #5a4e3e;
    font-size: 14px;
    line-height: 1.9;
    background: rgba(217, 123, 47, 0.06);
    border-radius: 0 6px 6px 0;
  }

  .code-block {
    background: #1e1e2e;
    color: #cdd6f4;
    border-radius: 8px;
    padding: 16px 20px;
    margin: 14px 0;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 12.5px;
    line-height: 1.7;
    overflow: hidden;
    position: relative;
  }

  .code-block .code-label {
    position: absolute;
    top: 8px;
    right: 12px;
    font-size: 10px;
    color: #6c7086;
    letter-spacing: 1px;
  }

  .code-block .comment { color: #6c7086; }
  .code-block .keyword { color: #cba6f7; }
  .code-block .string { color: #a6e3a1; }
  .code-block .property { color: #89b4fa; }

  .cover-front {
    background: linear-gradient(145deg, #1a1520 0%, #2a1f30 30%, #1e1828 70%, #0f0d14 100%);
    border-radius: 0 10px 10px 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 50px;
    position: relative;
    overflow: hidden;
  }

  .cover-front::before {
    content: '';
    position: absolute;
    inset: 10px;
    border: 1px solid rgba(217, 123, 47, 0.3);
    border-radius: 6px;
    pointer-events: none;
  }

  .cover-front::after {
    content: '';
    position: absolute;
    inset: 18px;
    border: 1px solid rgba(217, 123, 47, 0.12);
    border-radius: 4px;
    pointer-events: none;
  }

  .cover-front .cover-icon {
    font-size: 48px;
    margin-bottom: 20px;
    opacity: 0.9;
  }

  .cover-front .cover-title {
    font-family: 'Noto Serif', 'Shippori Mincho', serif;
    font-size: 34px;
    color: #D9A76F;
    text-align: center;
    margin-bottom: 8px;
    letter-spacing: 4px;
    text-shadow: 0 2px 12px rgba(0,0,0,0.5);
    font-weight: 700;
  }

  .cover-front .cover-subtitle {
    font-size: 14px;
    color: #b89868;
    text-align: center;
    letter-spacing: 4px;
    margin-bottom: 28px;
  }

  .cover-front .cover-ornament {
    color: #D97B2F;
    font-size: 20px;
    letter-spacing: 12px;
    margin: 14px 0;
    opacity: 0.5;
  }

  .cover-front .cover-author {
    font-size: 15px;
    color: #c8a878;
    letter-spacing: 6px;
    margin-top: 20px;
  }

  .cover-left {
    background: linear-gradient(to right, #1e1828, #1a1520);
    border-radius: 10px 0 0 10px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .cover-left .spine-text {
    writing-mode: vertical-rl;
    color: #6a5a48;
    font-size: 12px;
    letter-spacing: 8px;
  }

  .nav {
    display: flex;
    align-items: center;
    gap: 28px;
    margin-top: 24px;
  }

  .nav button {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.12);
    color: #d0c8b8;
    padding: 12px 30px;
    border-radius: 40px;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.3s;
    font-family: 'Noto Serif', 'Noto Sans JP', sans-serif;
  }

  .nav button:hover {
    background: rgba(217, 123, 47, 0.15);
    color: #fff;
    border-color: rgba(217, 123, 47, 0.3);
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  }

  .nav button:disabled {
    opacity: 0.25;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .page-indicator {
    color: #887868;
    font-size: 13px;
    letter-spacing: 2px;
    font-family: 'Noto Serif', 'Noto Sans JP', sans-serif;
  }

  .title-bar {
    color: #D9A76F;
    font-family: 'Noto Serif', 'Shippori Mincho', serif;
    font-size: 15px;
    letter-spacing: 6px;
    margin-bottom: 6px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.5);
  }

  .flip-hint {
    position: absolute;
    right: 24px;
    bottom: 22px;
    color: rgba(217, 123, 47, 0.5);
    font-size: 12px;
    animation: hintPulse 2s ease-in-out infinite;
  }

  @keyframes hintPulse {
    0%, 100% { opacity: 0.3; transform: translateX(0); }
    50% { opacity: 0.8; transform: translateX(-6px); }
  }

  .page:not(.flipped):hover .front {
    box-shadow: inset -14px 0 36px rgba(0,0,0,0.1), 5px 0 14px rgba(0,0,0,0.15);
  }

  .book::before {
    content: '';
    position: absolute;
    left: 50%;
    top: 0;
    width: 8px;
    height: 100%;
    transform: translateX(-50%);
    background: linear-gradient(to right,
      rgba(0,0,0,0.15),
      rgba(0,0,0,0.35),
      rgba(0,0,0,0.15)
    );
    z-index: 100;
    pointer-events: none;
  }

  .tip-box {
    background: linear-gradient(135deg, rgba(217,123,47,0.06), rgba(217,167,111,0.06));
    border: 1px solid rgba(217,123,47,0.15);
    border-radius: 8px;
    padding: 14px 18px;
    margin: 14px 0;
  }

  .tip-box .tip-title {
    font-size: 11px;
    font-weight: 700;
    color: #D97B2F;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }

  .tip-box ul {
    padding-left: 18px;
    font-size: 13px;
    line-height: 1.9;
    color: #5a4e3e;
  }

  .comparison {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin: 14px 0;
  }

  .comparison .col {
    padding: 14px;
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.8;
  }

  .comparison .col.bad {
    background: rgba(180, 60, 60, 0.06);
    border: 1px solid rgba(180, 60, 60, 0.15);
  }

  .comparison .col.good {
    background: rgba(60, 160, 80, 0.06);
    border: 1px solid rgba(60, 160, 80, 0.15);
  }

  .comparison .col-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    margin-bottom: 6px;
  }

  .comparison .bad .col-label { color: #b43c3c; }
  .comparison .good .col-label { color: #3ca050; }

  .tag {
    display: inline-block;
    background: rgba(217,123,47,0.1);
    color: #D97B2F;
    font-size: 11px;
    padding: 2px 10px;
    border-radius: 12px;
    margin-right: 6px;
    font-weight: 500;
  }

  strong { color: #2c2416; }
</style>
</head>

let currentPage = 0;
const book = document.getElementById('book');
const leftPage = document.getElementById('leftPage');
const indicator = document.getElementById('indicator');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');

// ── Audio ──
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playFlipSound() {
  const bufLen = audioCtx.sampleRate * 0.25;
  const buf = audioCtx.createBuffer(1, bufLen, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufLen; i++) {
    data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufLen, 3) * 0.35;
  }
  const noise = audioCtx.createBufferSource();
  noise.buffer = buf;
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.setValueAtTime(3000, audioCtx.currentTime);
  filter.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.2);
  filter.Q.value = 0.8;
  const g1 = audioCtx.createGain();
  g1.gain.setValueAtTime(0.4, audioCtx.currentTime);
  g1.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
  noise.connect(filter); filter.connect(g1); g1.connect(audioCtx.destination);
  noise.start(); noise.stop(audioCtx.currentTime + 0.25);

  const osc = audioCtx.createOscillator();
  osc.frequency.setValueAtTime(120, audioCtx.currentTime + 0.08);
  osc.frequency.exponentialRampToValueAtTime(60, audioCtx.currentTime + 0.2);
  osc.type = 'sine';
  const g2 = audioCtx.createGain();
  g2.gain.setValueAtTime(0, audioCtx.currentTime);
  g2.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + 0.09);
  g2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.22);
  osc.connect(g2); g2.connect(audioCtx.destination);
  osc.start(audioCtx.currentTime + 0.08); osc.stop(audioCtx.currentTime + 0.25);
}

function playSoftRustle(intensity) {
  const len = audioCtx.sampleRate * 0.08;
  const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2) * 0.08 * intensity;
  const s = audioCtx.createBufferSource(); s.buffer = buf;
  const f = audioCtx.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = 2000;
  const g = audioCtx.createGain(); g.gain.value = 0.3;
  s.connect(f); f.connect(g); g.connect(audioCtx.destination);
  s.start(); s.stop(audioCtx.currentTime + 0.08);
}

// ── Safe transition end (timeout fallback) ──
function onTransitionEnd(el, cb) {
  let done = false;
  function handler() { if (done) return; done = true; el.removeEventListener('transitionend', handler); cb(); }
  el.addEventListener('transitionend', handler);
  setTimeout(handler, 700);
}

// ── Build pages ──
function buildPages() {
  pages.forEach((p, i) => {
    const div = document.createElement('div');
    div.className = 'page';
    div.dataset.index = i;
    div.style.zIndex = pages.length - i;
    div.innerHTML = '<div class="front">'+p.front+'</div><div class="back">'+p.back+'</div>';
    book.appendChild(div);
  });
}

// ── Drag-to-flip state ──
let isDragging = false;
let dragPage = null;        // the DOM element being dragged
let dragDirection = null;   // 'next' or 'prev'
let dragStartX = 0;
let dragCurrentAngle = 0;   // 0 = flat, -180 = fully flipped
let lastRustleAngle = 0;
let bookRect = null;

function getPageElements() {
  return Array.from(book.querySelectorAll('.page'));
}

function updateView(skipTransition) {
  const allPages = getPageElements();
  allPages.forEach((p, i) => {
    if (p === dragPage) return; // don't touch the page being dragged
    p.classList.remove('dragging', 'snap-back', 'snap-complete');
    if (!skipTransition) p.style.transition = '';
    p.style.transform = '';
    if (i < currentPage) {
      p.classList.add('flipped');
      p.style.zIndex = i;
    } else {
      p.classList.remove('flipped');
      p.style.zIndex = pages.length - i;
    }
  });

  if (currentPage > 0 && currentPage <= pages.length) {
    leftPage.innerHTML = '<div style="padding:44px 40px;height:100%;display:flex;flex-direction:column;">'+
      (pages[currentPage-1].leftContent || pages[currentPage-1].back)+'</div>';
    leftPage.style.background = 'linear-gradient(225deg, #fefcf7 0%, #f5f0e8 100%)';
  } else {
    leftPage.innerHTML = '<div class="cover-left" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;"><div class="spine-text">ПРАКТИЧЕСКОЕ РУКОВОДСТВО CLAUDE CODE</div></div>';
    leftPage.style.background = 'linear-gradient(to right, #1e1828, #1a1520)';
  }

  if (currentPage === 0) indicator.textContent = 'Обложка';
  else if (currentPage >= pages.length) indicator.textContent = 'Конец';
  else indicator.textContent = (currentPage*2-1) + ' ─ ' + (currentPage*2);

  prevBtn.disabled = currentPage === 0;
  nextBtn.disabled = currentPage >= pages.length;
}

// ── Mouse / Touch handlers ──
function onDragStart(e) {
  if (isDragging) return;
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  bookRect = book.getBoundingClientRect();
  const bookCenterX = bookRect.left + bookRect.width / 2;

  // Determine direction: click on right half = next, left half = prev
  if (clientX >= bookCenterX) {
    // Flip forward
    if (currentPage >= pages.length) return;
    const allPages = getPageElements();
    dragPage = allPages[currentPage];
    dragDirection = 'next';
  } else {
    // Flip backward
    if (currentPage <= 0) return;
    const allPages = getPageElements();
    dragPage = allPages[currentPage - 1];
    dragDirection = 'prev';
  }

  isDragging = true;
  dragStartX = clientX;
  dragCurrentAngle = dragDirection === 'next' ? 0 : -180;
  lastRustleAngle = dragCurrentAngle;

  dragPage.classList.add('dragging');
  dragPage.classList.remove('flipped', 'snap-back', 'snap-complete');
  dragPage.style.zIndex = pages.length + 1;
  dragPage.style.transform = `rotateY(${dragCurrentAngle}deg)`;

  e.preventDefault();
}

function onDragMove(e) {
  if (!isDragging || !dragPage) return;
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const dx = clientX - dragStartX;
  const halfWidth = bookRect.width / 2;

  if (dragDirection === 'next') {
    // drag left → angle goes from 0 to -180
    const progress = Math.max(0, Math.min(1, -dx / halfWidth));
    dragCurrentAngle = -progress * 180;
  } else {
    // drag right → angle goes from -180 to 0
    const progress = Math.max(0, Math.min(1, dx / halfWidth));
    dragCurrentAngle = -180 + progress * 180;
  }

  dragPage.style.transform = `rotateY(${dragCurrentAngle}deg)`;

  // Soft rustle sound every ~30 degrees of movement
  if (Math.abs(dragCurrentAngle - lastRustleAngle) > 30) {
    const intensity = Math.min(1, Math.abs(dragCurrentAngle - lastRustleAngle) / 60);
    playSoftRustle(intensity);
    lastRustleAngle = dragCurrentAngle;
  }

  // Dynamic shadow on spine based on angle
  const absAngle = Math.abs(dragCurrentAngle);
  const shadowIntensity = 0.15 + (absAngle > 90 ? (180 - absAngle) / 90 : absAngle / 90) * 0.25;
  book.style.setProperty('--spine-shadow', shadowIntensity);

  e.preventDefault();
}

function onDragEnd(e) {
  if (!isDragging || !dragPage) return;
  isDragging = false;

  const absAngle = Math.abs(dragCurrentAngle);
  const threshold = 50; // degrees needed to commit the flip

  if (dragDirection === 'next') {
    if (absAngle > threshold) {
      // Complete the flip
      dragPage.classList.remove('dragging');
      dragPage.classList.add('snap-complete');
      dragPage.style.transform = 'rotateY(-180deg)';
      playFlipSound();
      currentPage++;

      onTransitionEnd(dragPage, () => {
        dragPage.classList.remove('snap-complete');
        dragPage.classList.add('flipped');
        dragPage.style.zIndex = currentPage - 1;
        dragPage = null;
        updateView();
      });
    } else {
      // Snap back
      dragPage.classList.remove('dragging');
      dragPage.classList.add('snap-back');
      dragPage.style.transform = 'rotateY(0deg)';
      onTransitionEnd(dragPage, () => {
        dragPage.classList.remove('snap-back');
        dragPage.style.zIndex = pages.length - currentPage;
        dragPage = null;
        updateView();
      });
    }
  } else {
    // prev direction
    if (absAngle < (180 - threshold)) {
      // Complete the flip back
      dragPage.classList.remove('dragging');
      dragPage.classList.add('snap-complete');
      dragPage.style.transform = 'rotateY(0deg)';
      playFlipSound();
      currentPage--;

      onTransitionEnd(dragPage, () => {
        dragPage.classList.remove('snap-complete', 'flipped');
        dragPage.style.zIndex = pages.length - currentPage;
        dragPage = null;
        updateView();
      });
    } else {
      // Snap back to flipped
      dragPage.classList.remove('dragging');
      dragPage.classList.add('snap-back');
      dragPage.style.transform = 'rotateY(-180deg)';
      onTransitionEnd(dragPage, () => {
        dragPage.classList.remove('snap-back');
        dragPage.classList.add('flipped');
        dragPage.style.zIndex = currentPage - 1;
        dragPage = null;
        updateView();
      });
    }
  }
}

// Attach events to book area
book.addEventListener('mousedown', onDragStart);
document.addEventListener('mousemove', onDragMove);
document.addEventListener('mouseup', onDragEnd);
book.addEventListener('touchstart', onDragStart, { passive: false });
document.addEventListener('touchmove', onDragMove, { passive: false });
document.addEventListener('touchend', onDragEnd);

// Button fallbacks
function nextPage() {
  if (isDragging || currentPage >= pages.length) return;
  const allPages = getPageElements();
  const pg = allPages[currentPage];
  pg.classList.add('snap-complete');
  pg.style.zIndex = pages.length + 1;
  pg.style.transform = 'rotateY(-180deg)';
  playFlipSound();
  currentPage++;
  onTransitionEnd(pg, () => {
    pg.classList.remove('snap-complete');
    pg.classList.add('flipped');
    updateView();
  });
}

function prevPage() {
  if (isDragging || currentPage <= 0) return;
  const allPages = getPageElements();
  const pg = allPages[currentPage - 1];
  pg.classList.remove('flipped');
  pg.classList.add('snap-complete');
  pg.style.zIndex = pages.length + 1;
  pg.style.transform = 'rotateY(0deg)';
  playFlipSound();
  currentPage--;
  onTransitionEnd(pg, () => {
    pg.classList.remove('snap-complete');
    updateView();
  });
}

// Keyboard
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextPage(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prevPage(); }
});

// Prevent text selection while dragging
book.addEventListener('selectstart', (e) => e.preventDefault());

buildPages();
updateView();
</script>
</body>
